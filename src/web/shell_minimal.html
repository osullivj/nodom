<!doctype html>
<html lang="en-us">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
        />
        <title>NoDOM</title>
        <style>
            body {
                margin: 0;
                background-color: black;
            }
            /* FIXME: with our GLFW example this block seems to break resizing and io.DisplaySize gets stuck */
            .emscripten {
                position: absolute;
                top: 0px;
                left: 0px;
                margin: 0px;
                border: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                display: block;
                image-rendering: optimizeSpeed;
                image-rendering: -moz-crisp-edges;
                image-rendering: -o-crisp-edges;
                image-rendering: -webkit-optimize-contrast;
                image-rendering: optimize-contrast;
                image-rendering: crisp-edges;
                image-rendering: pixelated;
                -ms-interpolation-mode: nearest-neighbor;
            }
        </style>
    </head>
    <body>
        <canvas
            class="emscripten"
            id="canvas"
            oncontextmenu="event.preventDefault()"
        ></canvas>
        <script type="text/javascript">
            const init_layout =
                '[{"rname": "Home", "cspec": { "title": "NoDOM"}, "children": [] },' +
                '{"widget_id": "app_loading_modal","rname": "LoadingModal",' +
                '"cspec": {"title": "Loading NoDOM app...","cname": "loading_text"}}]';
            const init_data =
                '{"loading_text":["Loading app data from \{_server_url\}"],' +
                '"actions": {' +
                '"GUI.gui_online": [\{"ui_push":"app_loading_modal"}],' +
                '"WebSock.websock_connection_failed": [{"ui_pop":"app_loading_modal"}]' +
                "}}";
            var Module = {
                arguments: [init_data, init_layout], // argv[0]='this.program', argv[1]=init_data, argv[1]=init_layout
                preRun: [],
                postRun: [],
                print: (function () {
                    return function (text) {
                        text = Array.prototype.slice.call(arguments).join(" ");
                        console.log(text);
                    };
                })(),
                printErr: function (text) {
                    text = Array.prototype.slice.call(arguments).join(" ");
                    console.error(text);
                },
                canvas: (function () {
                    var canvas = document.getElementById("canvas");
                    //canvas.addEventListener("webglcontextlost", function(e) { alert('FIXME: WebGL context lost, please reload the page'); e.preventDefault(); }, false);
                    return canvas;
                })(),
                setStatus: function (text) {
                    console.log("status: " + text);
                },
                monitorRunDependencies: function (left) {
                    // no run dependencies to log
                },
            };
            window.onerror = function () {
                console.log("onerror: " + event);
            };
        </script>
        {{{ SCRIPT }}}
    </body>
</html>
